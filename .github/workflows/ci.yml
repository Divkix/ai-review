# Static CI for ai-review itself. No secrets, no DeepSeek, no live PRs — pure
# lint + invariant checks that catch the regression classes we actually hit:
# workflow/shell syntax, pin drift + supply-chain hash mismatch, the
# prompt<->workflow env contract, and the reconcile logic the workflows source.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: actionlint + shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install actionlint (pinned)
        run: |
          set -euo pipefail
          VER="1.7.12"
          SHA="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz"
          echo "${SHA}  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /usr/local/bin actionlint
          actionlint --version

      # shellcheck is preinstalled on ubuntu-latest runners; actionlint shells
      # out to it for every run: block.
      - name: Lint workflows
        run: actionlint -color .github/workflows/*.yml

      - name: Lint standalone shell scripts
        run: shellcheck scripts/check-pins.sh scripts/bump-pins.sh scripts/release.sh scripts/lib/*.sh

  pins:
    name: pin consistency + live sha256
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check pins
        run: bash scripts/check-pins.sh

  contract:
    name: prompt/permission contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install deps
        run: python3 -m pip install --quiet pyyaml
      - name: Check contract
        run: python3 scripts/check-contract.py

  unit:
    name: bats unit tests (reconcile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install bats + jq + ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bats jq ripgrep
      - name: Run unit tests
        run: bats tests/
