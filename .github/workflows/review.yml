# ai-review — reusable PR review workflow (CodeRabbit-style, self-hosted).
#
# Called via `workflow_call` from a caller repo's workflow (pull_request /
# issue_comment events). Runs in the CONTEXT OF THE CALLER repo: the caller's
# PR head is checked out, while this repo (divkix/ai-review) is checked out
# separately into `.ai-review-tooling/` for prompts/ and rules/.
#
# Contract:
#   inputs.mode        'auto' (default) | 'full' | 'incremental'
#                      auto: incremental when a state marker with a lastSha
#                      exists and the event is not 'opened', else full.
#   inputs.pr_number   optional; REQUIRED when invoked from issue_comment
#                      context (no PR payload on the event).
#   inputs.model       LLM model id (default: deepseek/deepseek-v4-pro).
#   inputs.variant     Model reasoning-effort variant (default: max).
#   inputs.api_key_env Env-var name the provider expects for its API key
#                      (default: DEEPSEEK_API_KEY).
#   secrets.LLM_API_KEY  required; API key for the chosen provider; exported
#                        under the name given by inputs.api_key_env.
#
# Jobs:
#   gate        resolve PR, draft gate, ack comment, read state marker
#               (<!-- ai-review:state {...} -->), find prior bot review,
#               decide mode / skip.
#   static      opengrep + gitleaks + osv-scanner -> SARIF -> findings.json
#               artifact. Findings never fail the job.
#   context     ripgrep-based impact map: where do symbols touched by the
#               diff appear elsewhere in the repo -> context.md artifact.
#   llm-review  opencode runs the review playbook (full or incremental) with
#               the env contract: FINDINGS_PATH, CONTEXT_PATH, HEAD_SHA,
#               LAST_SHA, PRIOR_STATE_JSON, PRIOR_REVIEW_ID,
#               STATUS_COMMENT_ID, BASE_REF, PR_NUMBER.
#               Runs with contents:read — the agent reads untrusted PR
#               content, so its token must not be able to push.
#   finalize    deterministic post-pass (no LLM): resolve review threads for
#               findings dropped from the new state, dismiss a superseded
#               REQUEST_CHANGES review. Holds the contents:write needed by
#               GitHub's resolveReviewThread mutation.
#
# Security: untrusted strings (comment bodies, state JSON, branch names) are
# never interpolated into `run:` scripts via ${{ }}; they flow through `env:`
# or jq.

name: ai-review

on:
  workflow_call:
    inputs:
      mode:
        description: "Review mode: auto, full, or incremental"
        type: string
        default: auto
      pr_number:
        description: "PR number; required when called from issue_comment context"
        type: string
        default: ''
      trigger_url:
        description: "URL of the comment that triggered this review (command runs)"
        type: string
        default: ''
      model:
        description: "LLM model id passed to opencode (any models.dev provider/model)"
        type: string
        default: deepseek/deepseek-v4-pro
      variant:
        description: "Model reasoning-effort variant (opencode maps this to reasoningEffort where the model defines variants)"
        type: string
        default: max
      verifier_model:
        description: "LLM model id for the skeptic/verifier pass (defaults to inputs.model when empty)"
        type: string
        default: ''
      verifier_variant:
        description: "Reasoning-effort variant for the verifier pass (defaults to inputs.variant when empty)"
        type: string
        default: ''
      api_key_env:
        description: "Env-var name the chosen provider expects for its API key (e.g. OPENAI_API_KEY)"
        type: string
        default: DEEPSEEK_API_KEY
    secrets:
      LLM_API_KEY:
        required: true
        description: "API key for the provider of inputs.model; exported under the env name in inputs.api_key_env"

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      pr: ${{ steps.resolve.outputs.pr }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
      skip: ${{ steps.resolve.outputs.skip == 'true' || steps.size_guard.outputs.skip == 'true' || steps.decide.outputs.skip == 'true' }}
      mode: ${{ steps.decide.outputs.mode }}
      ack_comment_id: ${{ steps.ack.outputs.ack_comment_id }}
      trigger_desc: ${{ steps.ack.outputs.trigger_desc }}
      state_json: ${{ steps.state.outputs.state_json }}
      last_sha: ${{ steps.state.outputs.last_sha }}
      prior_review_id: ${{ steps.prior.outputs.prior_review_id }}
      ignore_patterns: ${{ steps.size_guard.outputs.ignore_patterns }}
      size_warning: ${{ steps.size_guard.outputs.size_warning }}
      config_warning: ${{ steps.size_guard.outputs.config_warning }}
      instructions: ${{ steps.size_guard.outputs.instructions }}
      guidelines_content: ${{ steps.size_guard.outputs.guidelines_content }}
      stacks: ${{ steps.size_guard.outputs.stacks }}
    steps:
      - name: Resolve PR and draft gate
        id: resolve
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          pr="${INPUT_PR_NUMBER:-${EVENT_PR_NUMBER:-}}"
          if [ -z "$pr" ]; then
            echo "::error::Unable to resolve PR number (pass inputs.pr_number when calling from issue_comment context)"
            exit 1
          fi
          info="$(gh pr view "$pr" --repo "$GITHUB_REPOSITORY" --json isDraft,headRefOid,baseRefName)"
          head_sha="$(jq -r '.headRefOid' <<<"$info")"
          base_ref="$(jq -r '.baseRefName' <<<"$info")"
          {
            echo "pr=$pr"
            echo "head_sha=$head_sha"
            echo "base_ref=$base_ref"
          } >> "$GITHUB_OUTPUT"
          if [ "$(jq -r '.isDraft' <<<"$info")" = "true" ]; then
            marker='<!-- ai-review:draft -->'
            count="$(gh api "repos/$GITHUB_REPOSITORY/issues/$pr/comments" --paginate \
              | jq -s --arg m "$marker" 'add | [.[] | select(.body | contains($m))] | length')"
            if [ "$count" = "0" ]; then
              body="$(printf '%s\n\n%s' "$marker" "📝 This PR is a draft — ai-review will start when it's marked ready for review.")"
              gh api "repos/$GITHUB_REPOSITORY/issues/$pr/comments" -f body="$body" > /dev/null
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      # Checked out before size_guard so scope.sh can be sourced for config
      # parsing and filtered counts. Pinned to the same internal ref used by
      # all other jobs; scripts/check-pins.sh asserts all internal pins share
      # one tag so this ref is covered automatically.
      - name: Checkout ai-review tooling (lib)
        if: steps.resolve.outputs.skip != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: divkix/ai-review
          ref: v0.4.0
          path: .ai-review-tooling
          persist-credentials: false

      # Config-driven size guard. Reads .ai-review.yml from the base branch via
      # the GitHub Contents API (PR head is NOT trusted — see design doc §1).
      # Guard fires only for auto-triggers; explicit /review or /review full
      # bypasses it. Filtered counts use config ignore + built-in patterns so
      # generated files don't inflate the count.
      - name: Check PR size
        id: size_guard
        if: steps.resolve.outputs.skip != 'true'
        env:
          PR: ${{ steps.resolve.outputs.pr }}
          BASE_REF: ${{ steps.resolve.outputs.base_ref }}
          MODE_INPUT: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          # shellcheck source=.ai-review-tooling/scripts/lib/scope.sh
          . .ai-review-tooling/scripts/lib/scope.sh

          # --- 1. Fetch config from base branch (fail-open on any error). ---
          config_raw="$(gh api \
            "repos/$GITHUB_REPOSITORY/contents/.ai-review.yml?ref=${BASE_REF}" \
            -q .content 2>/dev/null \
            | base64 -d 2>/dev/null || true)"

          # --- 2. Parse config; apply defaults on invalid or absent config. ---
          config_out="$(scope_parse_config <<< "$config_raw")"
          valid="$(grep '^valid=' <<< "$config_out" | cut -d= -f2-)"
          config_warning=""
          if [ "$valid" = "false" ]; then
            config_warning="⚠️ .ai-review.yml on ${BASE_REF} is malformed — using defaults."
            echo "config warning: $config_warning"
          fi
          max_files="$(grep '^max_changed_files=' <<< "$config_out" | cut -d= -f2- || true)"
          max_lines="$(grep '^max_diff_lines=' <<< "$config_out" | cut -d= -f2- || true)"
          # Apply defaults when keys absent or config invalid.
          : "${max_files:=400}"
          : "${max_lines:=20000}"
          if [ "$valid" = "false" ]; then
            max_files=400
            max_lines=20000
          fi

          # --- 3. Build combined patterns file (config ignores + builtins). ---
          patterns_file="$(mktemp /tmp/scope-patterns.XXXXXX)"
          grep '^ignore=' <<< "$config_out" | cut -d= -f2- >> "$patterns_file" || true
          scope_builtin_ignores >> "$patterns_file"

          # Emit config-only patterns as ignore_patterns output (newline-joined).
          config_patterns="$(grep '^ignore=' <<< "$config_out" | cut -d= -f2- || true)"
          delim_ip="IGNPAT_EOF_$(od -An -N8 -tx1 /dev/urandom | tr -d ' \n')"
          {
            echo "ignore_patterns<<${delim_ip}"
            echo "$config_patterns"
            echo "${delim_ip}"
          } >> "$GITHUB_OUTPUT"

          # Emit config_warning now so Upsert step can read it.
          if [ -n "$config_warning" ]; then
            echo "config_warning=${config_warning}" >> "$GITHUB_OUTPUT"
          fi

          # --- Emit instructions output (newline-joined heredoc). ---
          config_instructions="$(grep '^instructions=' <<< "$config_out" | cut -d= -f2- || true)"
          delim_instr="INSTR_EOF_$(od -An -N8 -tx1 /dev/urandom | tr -d ' \n')"
          {
            echo "instructions<<${delim_instr}"
            echo "$config_instructions"
            echo "${delim_instr}"
          } >> "$GITHUB_OUTPUT"

          # --- Fetch guidelines from base branch (explicit + auto-detected). ---
          # All sources are read from the BASE branch only (?ref=$BASE_REF) so a
          # PR cannot inject its own guidelines. Each fetch is fail-open. A
          # manifest of "<label>\t<tmpfile>" lines is handed to
          # scope_render_guidelines, which dedups by content, caps each source
          # (16 KB) and the whole section (48 KB), and renders the markdown.
          guidelines_path="$(grep '^guidelines=' <<< "$config_out" | cut -d= -f2- || true)"
          auto_guidelines="$(grep '^auto_guidelines=' <<< "$config_out" | cut -d= -f2- || true)"
          : "${auto_guidelines:=true}"

          # Build the ordered candidate list: explicit guidelines: first, then
          # (when enabled) the well-known agent-rule files and any
          # .cursor/rules/*.mdc entries.
          gl_candidates=()
          if [ -n "$guidelines_path" ]; then
            gl_candidates+=("$guidelines_path")
          fi
          if [ "$auto_guidelines" != "false" ]; then
            while IFS= read -r cand || [ -n "$cand" ]; do
              [ -n "$cand" ] && gl_candidates+=("$cand")
            done < <(scope_auto_guideline_candidates)
            # Enumerate .cursor/rules/*.mdc (one directory level). The array
            # guard keeps a file (object) response from erroring under jq.
            while IFS= read -r mdc || [ -n "$mdc" ]; do
              [ -n "$mdc" ] && gl_candidates+=("$mdc")
            done < <(gh api "repos/$GITHUB_REPOSITORY/contents/.cursor/rules?ref=${BASE_REF}" 2>/dev/null \
              | jq -r 'if type=="array" then .[] else empty end
                       | select(.type=="file")
                       | select((.name? // "") | endswith(".mdc"))
                       | .path' 2>/dev/null | sort || true)
          fi

          # Fetch each candidate, validate it is a real base64-encoded file
          # (skips 404s, directories, oversized files with encoding:"none", and
          # broken symlinks), and append surviving sources to the manifest.
          gl_manifest="$(mktemp /tmp/scope-guidelines.XXXXXX)"
          for cand in "${gl_candidates[@]}"; do
            cand_json="$(gh api "repos/$GITHUB_REPOSITORY/contents/${cand}?ref=${BASE_REF}" 2>/dev/null || true)"
            [ -n "$cand_json" ] || continue
            cand_type="$(jq -r 'if type=="object" then (.type // "") else "array" end' <<< "$cand_json" 2>/dev/null || true)"
            cand_enc="$(jq -r 'if type=="object" then (.encoding // "") else "" end' <<< "$cand_json" 2>/dev/null || true)"
            if [ "$cand_type" != "file" ] || [ "$cand_enc" != "base64" ]; then continue; fi
            cand_body="$(jq -r '.content // ""' <<< "$cand_json" 2>/dev/null | base64 -d 2>/dev/null || true)"
            [ -n "$cand_body" ] || continue
            cand_tmp="$(mktemp /tmp/scope-guideline-src.XXXXXX)"
            printf '%s' "$cand_body" > "$cand_tmp"
            printf '%s\t%s\n' "$cand" "$cand_tmp" >> "$gl_manifest"
          done

          guidelines_content="$(scope_render_guidelines < "$gl_manifest" || true)"
          delim_gl="GUIDE_EOF_$(od -An -N8 -tx1 /dev/urandom | tr -d ' \n')"
          {
            echo "guidelines_content<<${delim_gl}"
            printf '%s' "$guidelines_content"
            echo ""
            echo "${delim_gl}"
          } >> "$GITHUB_OUTPUT"

          # --- 4. Detect stacks (fetch PR files JSON once; reused below). ---
          pr_files_json="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR/files" --paginate \
            | jq -s 'add // []')"
          stacks="$(scope_detect_stacks <<< "$pr_files_json" | tr '\n' ' ' | sed 's/ *$//')"
          delim_st="STACKS_EOF_$(od -An -N8 -tx1 /dev/urandom | tr -d ' \n')"
          {
            echo "stacks<<${delim_st}"
            echo "$stacks"
            echo "${delim_st}"
          } >> "$GITHUB_OUTPUT"
          echo "detected stacks: ${stacks:-<none>}"

          # --- 5. Explicit /review or /review full bypasses the size guard. ---
          if [ -n "$MODE_INPUT" ] && [ "$MODE_INPUT" != "auto" ]; then
            # Still compute filtered counts to log them; bypass the guard.
            # Reuse $pr_files_json already fetched above (avoids a duplicate API call).
            counts="$(jq -s 'add // []' <<< "$pr_files_json" \
              | scope_filtered_counts "$patterns_file")"
            filtered_files="$(grep '^files=' <<< "$counts" | cut -d= -f2-)"
            filtered_lines="$(grep '^lines=' <<< "$counts" | cut -d= -f2-)"
            echo "PR size (filtered): ${filtered_files} files, ${filtered_lines} lines (limits: ${max_files}/${max_lines}) — bypassed (explicit mode)"
            if [ "$filtered_files" -gt "$max_files" ] || [ "$filtered_lines" -gt "$max_lines" ]; then
              size_warning="⚠️ Large PR (${filtered_files} files / ${filtered_lines} lines) — token usage may be high."
              echo "size_warning=${size_warning}" >> "$GITHUB_OUTPUT"
            fi
            echo "skip=false" >> "$GITHUB_OUTPUT"
            rm -f "$patterns_file"
            exit 0
          fi

          # --- 6. Auto mode: apply the guard. ---
          # Reuse $pr_files_json already fetched above (avoids a duplicate API call).
          counts="$(jq -s 'add // []' <<< "$pr_files_json" \
            | scope_filtered_counts "$patterns_file")"
          filtered_files="$(grep '^files=' <<< "$counts" | cut -d= -f2-)"
          filtered_lines="$(grep '^lines=' <<< "$counts" | cut -d= -f2-)"
          echo "PR size (filtered): ${filtered_files} files, ${filtered_lines} lines (limits: ${max_files}/${max_lines})"
          rm -f "$patterns_file"

          if [ "$filtered_files" -gt "$max_files" ] || [ "$filtered_lines" -gt "$max_lines" ]; then
            marker='<!-- ai-review:too-large -->'
            # shellcheck disable=SC2016  # literal backticks in markdown body
            body="$(printf '%s\n\nai-review: PR too large for auto-review.\n\n**%s** filtered files changed, **%s** filtered lines changed (limit: **%s files / %s lines**).\n\nComment \`/review full\` to force a full review of this PR.' \
              "$marker" "$filtered_files" "$filtered_lines" "$max_files" "$max_lines")"
            existing_id="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" --paginate \
              | jq -rs --arg m "$marker" 'add | [.[] | select(.body | contains($m))] | last | .id // empty')"
            if [ -n "$existing_id" ]; then
              gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing_id" \
                -f body="$body" > /dev/null
            else
              gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" \
                -f body="$body" > /dev/null
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Read state marker comment
        id: state
        if: steps.resolve.outputs.skip != 'true' && steps.size_guard.outputs.skip != 'true'
        env:
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" --paginate \
            | jq -s 'add' > "$RUNNER_TEMP/comments.json"
          # Only trust state markers authored by the github-actions bot itself;
          # any user could otherwise plant a forged marker comment.
          state_comment="$(jq -c '[.[]
            | select(.user.type == "Bot" and (.user.login | startswith("github-actions")))
            | select(.body | contains("<!-- ai-review:state"))] | last // empty' "$RUNNER_TEMP/comments.json")"
          state_json=""
          last_sha=""
          if [ -n "$state_comment" ]; then
            raw="$(jq -r '.body | capture("<!-- ai-review:state (?<j>.*?) -->"; "s") | .j // ""' <<<"$state_comment" || true)"
            if [ -n "$raw" ] && state_json="$(jq -c . <<<"$raw" 2>/dev/null)"; then
              last_sha="$(jq -r '.lastSha // ""' <<<"$state_json")"
            else
              state_json=""
            fi
          fi
          # Validate before writing to GITHUB_OUTPUT: a malformed value could
          # otherwise inject extra output lines or break downstream git/jq use.
          if ! grep -qE '^[0-9a-f]{40}$' <<<"$last_sha"; then
            last_sha=""
          fi
          delim="STATE_EOF_$(od -An -N8 -tx1 /dev/urandom | tr -d ' \n')"
          {
            echo "last_sha=$last_sha"
            echo "state_json<<$delim"
            echo "$state_json"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Find prior bot review
        id: prior
        if: steps.resolve.outputs.skip != 'true' && steps.size_guard.outputs.skip != 'true'
        env:
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -euo pipefail
          # Take the bot's LATEST review of any settled state; only emit an id
          # when that latest review is still CHANGES_REQUESTED. A later
          # APPROVED/COMMENTED review supersedes an older CHANGES_REQUESTED.
          prior_review_id="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR/reviews" --paginate \
            | jq -rs 'add
                | [.[] | select((.user.type == "Bot")
                    and (.user.login | startswith("github-actions"))
                    and (.state != "PENDING"))]
                | last
                | if (. != null and .state == "CHANGES_REQUESTED")
                  then (.id | tostring) else "" end')"
          [ "$prior_review_id" = "null" ] && prior_review_id=""
          echo "prior_review_id=$prior_review_id" >> "$GITHUB_OUTPUT"

      - name: Decide mode
        id: decide
        if: steps.resolve.outputs.skip != 'true' && steps.size_guard.outputs.skip != 'true'
        env:
          MODE_INPUT: ${{ inputs.mode }}
          EVENT_ACTION: ${{ github.event.action }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          LAST_SHA: ${{ steps.state.outputs.last_sha }}
        run: |
          set -euo pipefail
          skip=false
          # Same-SHA skip applies only in auto mode: an explicit /review or
          # /review full must always re-run.
          if [ "${MODE_INPUT:-auto}" = "auto" ] && [ -n "$LAST_SHA" ] && [ "$LAST_SHA" = "$HEAD_SHA" ]; then
            echo "Head SHA already reviewed; nothing new to do."
            skip=true
          fi
          if [ -n "$MODE_INPUT" ] && [ "$MODE_INPUT" != "auto" ]; then
            mode="$MODE_INPUT"
          elif [ -n "$LAST_SHA" ] && [ "$EVENT_ACTION" != "opened" ]; then
            mode=incremental
          else
            mode=full
          fi
          # No baseline SHA means incremental is impossible, even if it was
          # requested explicitly: fall back to a full review.
          [ -z "$LAST_SHA" ] && mode=full
          {
            echo "skip=$skip"
            echo "mode=$mode"
          } >> "$GITHUB_OUTPUT"

      # ONE sticky status comment per PR (marker: ai-review:ack). It carries
      # the in-progress status now, gets rewritten with the final status by
      # the llm-review job, and embeds the state marker so no separate state
      # comment exists.
      - name: Upsert status comment
        id: ack
        if: steps.resolve.outputs.skip != 'true' && steps.size_guard.outputs.skip != 'true' && steps.decide.outputs.skip != 'true'
        env:
          PR: ${{ steps.resolve.outputs.pr }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          LAST_SHA: ${{ steps.state.outputs.last_sha }}
          MODE: ${{ steps.decide.outputs.mode }}
          STATE_JSON: ${{ steps.state.outputs.state_json }}
          TRIGGER_URL: ${{ inputs.trigger_url }}
          EVENT_ACTION: ${{ github.event.action }}
          CONFIG_WARNING: ${{ steps.size_guard.outputs.config_warning }}
          SIZE_WARNING: ${{ steps.size_guard.outputs.size_warning }}
        run: |
          set -euo pipefail
          marker="<!-- ai-review:ack -->"
          repo_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          short_head="${HEAD_SHA:0:7}"
          if [ "$MODE" = "incremental" ] && [ -n "$LAST_SHA" ]; then
            range="[\`${LAST_SHA:0:7}\`…\`${short_head}\`](${repo_url}/compare/${LAST_SHA}...${HEAD_SHA})"
          else
            range="[\`${short_head}\`](${repo_url}/commit/${HEAD_SHA})"
          fi
          if [ -n "$TRIGGER_URL" ]; then
            trigger="[comment](${TRIGGER_URL})"
          else
            case "$EVENT_ACTION" in
              opened) trigger="PR opened" ;;
              synchronize) trigger="push" ;;
              ready_for_review) trigger="marked ready for review" ;;
              reopened) trigger="PR reopened" ;;
              *) trigger="${EVENT_ACTION:-event}" ;;
            esac
          fi
          state_line=""
          [ -n "$STATE_JSON" ] && state_line="<!-- ai-review:state $STATE_JSON -->"
          # Append config_warning and size_warning before the state line when set.
          extra_lines=""
          [ -n "$CONFIG_WARNING" ] && extra_lines="${extra_lines}${CONFIG_WARNING}\n"
          [ -n "$SIZE_WARNING" ] && extra_lines="${extra_lines}${SIZE_WARNING}\n"
          body="$(printf '%s\n\n🔍 ai-review: **%s** review of %s in progress… (triggered by %s)\n\n%s%s' \
            "$marker" "$MODE" "$range" "$trigger" "$extra_lines" "$state_line")"
          existing_id="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" --paginate \
            | jq -rs --arg m "$marker" 'add | [.[] | select(.body | contains($m))] | last | .id // empty')"
          if [ -n "$existing_id" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing_id" -f body="$body" > /dev/null
            ack_id="$existing_id"
          else
            ack_id="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" -f body="$body" --jq .id)"
          fi
          {
            echo "ack_comment_id=$ack_id"
            echo "trigger_desc=$trigger"
          } >> "$GITHUB_OUTPUT"
          # Migration/dedup: state now lives inside this status comment.
          # Remove any standalone bot state comments so the gate never reads
          # a stale one on later runs.
          gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" --paginate \
            | jq -rs --argjson keep "$ack_id" 'add
                | [.[] | select(.user.type == "Bot"
                    and (.user.login | startswith("github-actions"))
                    and (.body | contains("<!-- ai-review:state"))
                    and (.id != $keep))]
                | .[].id' \
            | while IFS= read -r cid; do
                [ -n "$cid" ] && gh api -X DELETE "repos/$GITHUB_REPOSITORY/issues/comments/$cid"
              done

  static:
    needs: gate
    if: needs.gate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout PR head (caller repo)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Pin to the exact SHA the gate resolved (not refs/pull/N/head) so a
          # push between gate and checkout can't swap in unreviewed code.
          ref: ${{ needs.gate.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      # Bump ref when releasing v2 of divkix/ai-review. Checked out before the
      # baseline step so it can source scripts/lib/reconcile.sh; into a subpath
      # so it never disturbs the PR-head working tree.
      - name: Checkout ai-review tooling (rules + lib)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: divkix/ai-review
          ref: v0.4.0
          path: .ai-review-tooling
          persist-credentials: false

      # Force-push can make the previously reviewed SHA unreachable; in that
      # case incremental baselines (opengrep/gitleaks) would error or silently
      # scan nothing. Compute job-local "effective" mode/baseline that fall
      # back to a full scan when the baseline commit is gone.
      - name: Verify baseline commit
        id: baseline
        env:
          MODE: ${{ needs.gate.outputs.mode }}
          LAST_SHA: ${{ needs.gate.outputs.last_sha }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/lib/reconcile.sh
          . .ai-review-tooling/scripts/lib/reconcile.sh
          eff="$(reconcile_effective_baseline "$MODE" "$LAST_SHA")"
          effective_mode="$(sed -n 's/^mode=//p' <<<"$eff")"
          effective_last_sha="$(sed -n 's/^last_sha=//p' <<<"$eff")"
          if [ "$effective_mode" != "$MODE" ]; then
            echo "Baseline $LAST_SHA unreachable (force-push?); falling back to full scan."
          fi
          {
            echo "effective_mode=$effective_mode"
            echo "effective_last_sha=$effective_last_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Install opengrep v1.22.0
        run: |
          set -euo pipefail
          OPENGREP_VERSION="1.22.0"
          OPENGREP_SHA256="45bcd58440e397ed52c50e953ccf5948909ea77087c9186fc7d277216f62e319"
          curl -fsSL -o /tmp/opengrep \
            "https://github.com/opengrep/opengrep/releases/download/v${OPENGREP_VERSION}/opengrep_manylinux_x86"
          echo "${OPENGREP_SHA256}  /tmp/opengrep" | sha256sum -c -
          chmod +x /tmp/opengrep
          sudo mv /tmp/opengrep /usr/local/bin/opengrep
          opengrep --version

      - name: Clone opengrep community rules (pinned)
        run: |
          set -euo pipefail
          OPENGREP_RULES_REF="f1d2b562b414783763fd02a6ed2736eaed622efa"
          git init -q /tmp/opengrep-rules
          git -C /tmp/opengrep-rules remote add origin https://github.com/opengrep/opengrep-rules
          git -C /tmp/opengrep-rules fetch -q --depth 1 origin "$OPENGREP_RULES_REF"
          git -C /tmp/opengrep-rules checkout -q FETCH_HEAD
          rm -rf /tmp/opengrep-rules/.github

      - name: Run opengrep
        env:
          MODE: ${{ steps.baseline.outputs.effective_mode }}
          LAST_SHA: ${{ steps.baseline.outputs.effective_last_sha }}
        run: |
          set -euo pipefail
          args=( scan -f /tmp/opengrep-rules -f .ai-review-tooling/rules
                 --sarif-output=opengrep.sarif --metrics=off
                 --exclude '.ai-review-tooling' )
          if [ "$MODE" = "incremental" ] && [ -n "$LAST_SHA" ]; then
            args+=( --baseline-commit "$LAST_SHA" )
          fi
          code=0
          opengrep "${args[@]}" . || code=$?
          echo "opengrep exit code: $code (findings never fail this job)"

      - name: Install gitleaks v8.30.1
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          GITLEAKS_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        env:
          MODE: ${{ steps.baseline.outputs.effective_mode }}
          LAST_SHA: ${{ steps.baseline.outputs.effective_last_sha }}
        run: |
          set -euo pipefail
          # --exit-code 0 so findings don't fail the job; SARIF still written.
          args=( git --report-format sarif --report-path gitleaks.sarif --exit-code 0 )
          if [ "$MODE" = "incremental" ] && [ -n "$LAST_SHA" ]; then
            args+=( --log-opts="${LAST_SHA}..HEAD" )
          fi
          gitleaks "${args[@]}" .

      - name: Install osv-scanner v2.3.8
        run: |
          set -euo pipefail
          OSV_SCANNER_VERSION="2.3.8"
          OSV_SCANNER_SHA256="bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc"
          curl -fsSL -o /tmp/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SCANNER_SHA256}  /tmp/osv-scanner" | sha256sum -c -
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Run osv-scanner
        run: |
          set -euo pipefail
          code=0
          osv-scanner scan source --format sarif --output osv.sarif ./ || code=$?
          # 0 = clean, 1 = vulns found (ok), 128 = no packages found (ok).
          case "$code" in
            0|1|128) echo "osv-scanner exit code: $code" ;;
            *) exit "$code" ;;
          esac

      - name: Upload opengrep SARIF
        if: ${{ !cancelled() && hashFiles('opengrep.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: opengrep.sarif
          category: ai-review-opengrep

      - name: Upload gitleaks SARIF
        if: ${{ !cancelled() && hashFiles('gitleaks.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: gitleaks.sarif
          category: ai-review-gitleaks

      - name: Upload osv SARIF
        if: ${{ !cancelled() && hashFiles('osv.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: osv.sarif
          category: ai-review-osv

      # shellcheck is installed BEFORE actionlint so actionlint auto-discovers it
      # on PATH and produces richer findings on run: blocks (D5 ordering note).
      - name: Install shellcheck v0.11.0
        run: |
          set -euo pipefail
          SHELLCHECK_VERSION="v0.11.0"
          SHELLCHECK_SHA256="8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198"
          curl -fsSL -o /tmp/shellcheck.tar.xz \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          echo "${SHELLCHECK_SHA256}  /tmp/shellcheck.tar.xz" | sha256sum -c -
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp "shellcheck-${SHELLCHECK_VERSION}/shellcheck"
          sudo mv "/tmp/shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Run shellcheck
        if: contains(needs.gate.outputs.stacks, 'shell')
        run: |
          set -euo pipefail
          # Collect all shell files in the repo (not just diff — shellcheck runs on whole files).
          mapfile -t shell_files < <(find . \
            -not -path './.ai-review-tooling/*' \
            \( -name '*.sh' -o -name '*.bash' -o -name '*.bats' -o -name '*.ksh' -o -name '*.dash' \) \
            2>/dev/null || true)
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "no shell files found — skipping"
            exit 0
          fi
          # --norc: do not read .shellcheckrc from the PR head (config isolation, D5).
          # --format=json1: structured output consumed by findings_from_shellcheck in sarif.sh.
          # Exits non-zero on findings — guard with || true.
          shellcheck --norc --format=json1 "${shell_files[@]}" > shellcheck.json || true

      - name: Install ruff 0.15.17
        run: |
          set -euo pipefail
          RUFF_VERSION="0.15.17"
          RUFF_SHA256="7bca4641db4b0256d20f3a8c38057725e0982965639f5f9a0fb2f9aece4b7c4f"
          curl -fsSL -o /tmp/ruff.tar.gz \
            "https://github.com/astral-sh/ruff/releases/download/${RUFF_VERSION}/ruff-x86_64-unknown-linux-gnu.tar.gz"
          echo "${RUFF_SHA256}  /tmp/ruff.tar.gz" | sha256sum -c -
          tar -xzf /tmp/ruff.tar.gz -C /tmp "ruff-x86_64-unknown-linux-gnu/ruff"
          sudo mv /tmp/ruff-x86_64-unknown-linux-gnu/ruff /usr/local/bin/ruff
          ruff --version

      - name: Run ruff
        if: contains(needs.gate.outputs.stacks, 'python')
        run: |
          set -euo pipefail
          # --isolated prevents reading any ruff.toml/pyproject.toml from the PR head (D5).
          # Exits 1 on findings — guard with || true.
          ruff check --isolated --output-format sarif . > ruff.sarif || true

      - name: Upload ruff SARIF
        if: ${{ !cancelled() && hashFiles('ruff.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ruff.sarif
          category: ai-review-ruff

      - name: Install golangci-lint v2.12.2
        run: |
          set -euo pipefail
          GOLANGCI_VERSION="2.12.2"
          GOLANGCI_SHA256="8df580d2670fed8fa984aac0507099af8df275e665215f5c7a2ae3943893a553"
          curl -fsSL -o /tmp/golangci.tar.gz \
            "https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_VERSION}/golangci-lint-${GOLANGCI_VERSION}-linux-amd64.tar.gz"
          echo "${GOLANGCI_SHA256}  /tmp/golangci.tar.gz" | sha256sum -c -
          tar -xzf /tmp/golangci.tar.gz -C /tmp "golangci-lint-${GOLANGCI_VERSION}-linux-amd64/golangci-lint"
          sudo mv "/tmp/golangci-lint-${GOLANGCI_VERSION}-linux-amd64/golangci-lint" /usr/local/bin/golangci-lint
          golangci-lint --version

      - name: Run golangci-lint
        if: contains(needs.gate.outputs.stacks, 'go')
        env:
          CGO_ENABLED: "0"
          GOTOOLCHAIN: local
        run: |
          set -euo pipefail
          # Shell guard: require go.mod at repo root (the tool needs a buildable module).
          [ -f go.mod ] || exit 0
          # --no-config: do not read .golangci.yml from PR head (D5).
          # --output.sarif.path: write SARIF to a file (NOT stdout — text reporter also writes there).
          # || true: exit 1 on findings must not fail the job.
          golangci-lint run --no-config --output.sarif.path=golangci.sarif ./... || true

      - name: Upload golangci-lint SARIF
        if: ${{ !cancelled() && hashFiles('golangci.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: golangci.sarif
          category: ai-review-golangci-lint

      - name: Install oxlint apps_v1.69.0
        run: |
          set -euo pipefail
          OXLINT_VERSION="apps_v1.70.0"
          OXLINT_SHA256="cba0142899d1ed1c79d4ff3a8a6c715cd06b5df74085abb7f5df47fb3fc3a42c"
          curl -fsSL -o /tmp/oxlint.tar.gz \
            "https://github.com/oxc-project/oxc/releases/download/${OXLINT_VERSION}/oxlint-x86_64-unknown-linux-gnu.tar.gz"
          echo "${OXLINT_SHA256}  /tmp/oxlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/oxlint.tar.gz -C /tmp oxlint-x86_64-unknown-linux-gnu
          sudo mv /tmp/oxlint-x86_64-unknown-linux-gnu /usr/local/bin/oxlint
          oxlint --version

      - name: Run oxlint
        if: contains(needs.gate.outputs.stacks, 'jsts')
        run: |
          set -euo pipefail
          # -c "$RUNNER_TEMP/oxlint-empty.json": pass an empty JSON config generated outside the
          #   PR tree — prevents oxlint from auto-discovering .oxlintrc.json from the PR head,
          #   which an attacker could use to silence its own findings (config isolation, D5).
          #   Note: --disable-nested-config alone does NOT defeat a root-level config file.
          # --format=sarif: emit SARIF to stdout (exits 0 even with findings).
          printf '{}' > "$RUNNER_TEMP/oxlint-empty.json"
          oxlint -c "$RUNNER_TEMP/oxlint-empty.json" --format=sarif . > oxlint.sarif

      - name: Upload oxlint SARIF
        if: ${{ !cancelled() && hashFiles('oxlint.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: oxlint.sarif
          category: ai-review-oxlint

      - name: Install hadolint v2.14.0
        run: |
          set -euo pipefail
          HADOLINT_VERSION="v2.14.0"
          HADOLINT_SHA256="6bf226944684f56c84dd014e8b979d27425c0148f61b3bd99bcc6f39e9dc5a47"
          curl -fsSL -o /tmp/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-linux-x86_64"
          echo "${HADOLINT_SHA256}  /tmp/hadolint" | sha256sum -c -
          chmod +x /tmp/hadolint
          sudo mv /tmp/hadolint /usr/local/bin/hadolint
          hadolint --version

      - name: Run hadolint
        if: contains(needs.gate.outputs.stacks, 'docker')
        run: |
          set -euo pipefail
          mapfile -t docker_files < <(find . \
            -not -path './.ai-review-tooling/*' \
            \( -name 'Dockerfile' -o -name 'Dockerfile.*' -o -name '*.dockerfile' \
               -o -name 'Containerfile' -o -name 'Containerfile.*' \) \
            2>/dev/null || true)
          if [ "${#docker_files[@]}" -eq 0 ]; then
            echo "no Dockerfile-like files found — skipping"
            exit 0
          fi
          # --no-fail: findings do not exit non-zero (belt-and-braces; || true is the outer guard).
          # -c .ai-review-tooling/rules/hadolint.yaml: vendored neutral config — prevents hadolint
          #   from reading a .hadolint.yaml committed in the PR head (config isolation, D5).
          #   Note: hadolint v2.14.0 has no --no-config flag; the vendored config is the correct approach.
          # --format sarif: native SARIF output.
          hadolint --no-fail -c .ai-review-tooling/rules/hadolint.yaml --format sarif "${docker_files[@]}" > hadolint.sarif || true

      - name: Upload hadolint SARIF
        if: ${{ !cancelled() && hashFiles('hadolint.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: hadolint.sarif
          category: ai-review-hadolint

      # actionlint is installed AFTER shellcheck so shellcheck is already on PATH,
      # giving actionlint richer findings on run: blocks (D5 ordering note).
      - name: Install actionlint v1.7.12
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.12"
          ACTIONLINT_SHA256="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Run actionlint
        if: contains(needs.gate.outputs.stacks, 'actions')
        run: |
          set -euo pipefail
          # Load the vendored SARIF template (pinned at v1.7.12, never fetched at runtime).
          tmpl=".ai-review-tooling/rules/actionlint-sarif.tmpl"
          if [ ! -f "$tmpl" ]; then
            echo "actionlint SARIF template missing at $tmpl — skipping"
            exit 0
          fi
          # actionlint auto-discovers .github/workflows/ from the repo root.
          # The shellcheck binary installed earlier is already on PATH for richer run: findings.
          # Exits non-zero on findings — guard with || true.
          # shellcheck disable=SC2046
          actionlint -format "$(cat "$tmpl")" > actionlint.sarif || true

      - name: Upload actionlint SARIF
        if: ${{ !cancelled() && hashFiles('actionlint.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: actionlint.sarif
          category: ai-review-actionlint

      - name: Install zizmor v1.25.2
        run: |
          set -euo pipefail
          ZIZMOR_VERSION="v1.25.2"
          ZIZMOR_SHA256="aa1facd105f0d83fe5c55b1adcd9d7417de5d83aa27471f91dc0b66cf3803577"
          curl -fsSL -o /tmp/zizmor.tar.gz \
            "https://github.com/zizmorcore/zizmor/releases/download/${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ZIZMOR_SHA256}  /tmp/zizmor.tar.gz" | sha256sum -c -
          tar -xzf /tmp/zizmor.tar.gz -C /tmp zizmor
          sudo mv /tmp/zizmor /usr/local/bin/zizmor
          zizmor --version

      - name: Run zizmor
        if: contains(needs.gate.outputs.stacks, 'actions')
        run: |
          set -euo pipefail
          # --format=sarif: native SARIF output.
          # --no-online-audits: fully hermetic (no network, no token consumed).
          # --no-exit-codes: exit 0 always (findings have severity-coded exit codes 10-14).
          # --no-config: prevents auto-discovery of zizmor.yml from the PR head — a committed
          #   config could suppress HIGH/error findings via rules.<id>.ignore (config isolation, D5).
          #   Note: zizmor v1.25.2 has --no-config; this was verified to restore suppressed findings.
          zizmor --format=sarif --no-online-audits --no-exit-codes --no-config .github/ > zizmor.sarif

      - name: Upload zizmor SARIF
        if: ${{ !cancelled() && hashFiles('zizmor.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: zizmor.sarif
          category: ai-review-zizmor

      - name: Install trivy v0.71.0
        run: |
          set -euo pipefail
          TRIVY_VERSION="0.71.1"
          TRIVY_SHA256="3cbae37cd440cd8676e5ce9207fe460b5641c7579a17e9d00f8894928c41a88d"
          curl -fsSL -o /tmp/trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  /tmp/trivy.tar.gz" | sha256sum -c -
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Run trivy
        if: contains(needs.gate.outputs.stacks, 'iac')
        run: |
          set -euo pipefail
          # config subcommand: misconfig-only (no vuln/secret scan — no overlap with osv/gitleaks).
          # --skip-check-update: use the binary-embedded checks bundle (pins the check set to the binary sha256, D23).
          # --misconfig-scanners: all IaC scanners except dockerfile (hadolint handles Dockerfiles).
          # --severity: filter to MEDIUM+ only; LOW trivy misconfig findings are noisy.
          # --format sarif: native SARIF output.
          # Exits non-zero on findings — guard with || true.
          trivy config \
            --format sarif \
            --skip-check-update \
            --severity MEDIUM,HIGH,CRITICAL \
            --misconfig-scanners azure-arm,cloudformation,helm,kubernetes,terraform,terraformplan-json,terraformplan-snapshot,ansible \
            -o trivy.sarif \
            . || true

      - name: Upload trivy SARIF
        if: ${{ !cancelled() && hashFiles('trivy.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy.sarif
          category: ai-review-trivy

      - name: Install typos v1.47.2
        run: |
          set -euo pipefail
          TYPOS_VERSION="v1.47.2"
          TYPOS_SHA256="7aef58932fc123b4cf4b40d86468e89a3297d80169051d7cfd13a235e05fc426"
          curl -fsSL -o /tmp/typos.tar.gz \
            "https://github.com/crate-ci/typos/releases/download/${TYPOS_VERSION}/typos-${TYPOS_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          echo "${TYPOS_SHA256}  /tmp/typos.tar.gz" | sha256sum -c -
          tar -xzf /tmp/typos.tar.gz -C /tmp ./typos
          sudo mv /tmp/typos /usr/local/bin/typos
          typos --version

      - name: Run typos
        run: |
          set -euo pipefail
          # No stack gate — typos is universal (catches typos in any text file).
          # --format sarif: native SARIF output.
          # Exits non-zero when typos are found — guard with || true.
          typos --format sarif . > typos.sarif || true

      - name: Upload typos SARIF
        if: ${{ !cancelled() && hashFiles('typos.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: typos.sarif
          category: ai-review-typos

      - name: Merge SARIF into findings.json
        env:
          IGNORE_PATTERNS: ${{ needs.gate.outputs.ignore_patterns }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/lib/sarif.sh
          . .ai-review-tooling/scripts/lib/sarif.sh
          # shellcheck source=.ai-review-tooling/scripts/lib/scope.sh
          . .ai-review-tooling/scripts/lib/scope.sh

          # Compose all 12 tools. Missing files (skipped tools) contribute [].
          # Security tools: uncapped (opengrep, gitleaks, osv, zizmor, trivy).
          # Lint tools: capped MEDIUM (ruff, golangci-lint, oxlint, shellcheck via shim, hadolint, actionlint).
          # Typos: capped LOW.
          {
            sarif_merge_one opengrep      opengrep.sarif
            sarif_merge_one gitleaks      gitleaks.sarif
            sarif_merge_one osv           osv.sarif
            sarif_merge_one ruff          ruff.sarif         MEDIUM
            sarif_merge_one golangci-lint golangci.sarif     MEDIUM
            sarif_merge_one oxlint        oxlint.sarif       MEDIUM
            findings_from_shellcheck      shellcheck.json    MEDIUM
            sarif_merge_one hadolint      hadolint.sarif     MEDIUM
            sarif_merge_one actionlint    actionlint.sarif   MEDIUM
            sarif_merge_one zizmor        zizmor.sarif
            sarif_merge_one trivy         trivy.sarif
            sarif_merge_one typos         typos.sarif        LOW
          } | jq -s 'add // []' > findings.json

          before="$(jq length findings.json)"
          echo "findings before filter: $before"
          # Filter findings forwarded to the LLM using CONFIG patterns only
          # (built-ins are about diff noise, not findings — a HIGH in a lockfile
          # must still flow to the LLM). SARIF uploads above are untouched.
          if [ -n "$IGNORE_PATTERNS" ]; then
            config_pats_file="$(mktemp /tmp/findings-pats.XXXXXX)"
            printf '%s\n' "$IGNORE_PATTERNS" > "$config_pats_file"
            scope_filter_findings "$config_pats_file" < findings.json > findings.filtered.json
            mv findings.filtered.json findings.json
            rm -f "$config_pats_file"
          fi
          after="$(jq length findings.json)"
          echo "findings after filter: $after"

      - name: Upload findings artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: findings
          path: findings.json

  # Pre-computed cross-file impact map (Tier 1 context). Heuristic by design:
  # identifiers are mined from the diff's changed lines and grepped across the
  # repo. ~80% of a call graph's value at ~5% of the complexity, and fully
  # language-agnostic. The playbook treats it as leads, not gospel.
  context:
    needs: gate
    if: needs.gate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout PR head (caller repo)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.gate.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      # Bump ref when releasing v2 of divkix/ai-review. Checked out so the
      # context job can source scripts/lib/context.sh; into a subpath so it
      # never disturbs the PR-head working tree.
      - name: Checkout ai-review tooling (lib)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: divkix/ai-review
          ref: v0.4.0
          path: .ai-review-tooling
          persist-credentials: false

      - name: Fetch base ref
        env:
          BASE_REF: ${{ needs.gate.outputs.base_ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git -c http.extraheader="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')" \
            fetch origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: Install ripgrep (pinned)
        run: |
          set -euo pipefail
          RIPGREP_VERSION="15.1.0"
          RIPGREP_SHA256="1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599"
          curl -fsSL -o /tmp/ripgrep.tar.gz \
            "https://github.com/BurntSushi/ripgrep/releases/download/${RIPGREP_VERSION}/ripgrep-${RIPGREP_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          echo "${RIPGREP_SHA256}  /tmp/ripgrep.tar.gz" | sha256sum -c -
          tar -xzf /tmp/ripgrep.tar.gz -C /tmp \
            "ripgrep-${RIPGREP_VERSION}-x86_64-unknown-linux-musl/rg"
          sudo mv "/tmp/ripgrep-${RIPGREP_VERSION}-x86_64-unknown-linux-musl/rg" /usr/local/bin/rg
          rg --version

      - name: Install ast-grep (pinned)
        run: |
          set -euo pipefail
          ASTGREP_VERSION="0.43.0"
          ASTGREP_SHA256="a26253a9c821d935f7e383e40f0de7c2ca62a4121de1f73a6d81ec32eae631e0"
          curl -fsSL -o /tmp/ast-grep.zip \
            "https://github.com/ast-grep/ast-grep/releases/download/${ASTGREP_VERSION}/app-x86_64-unknown-linux-gnu.zip"
          echo "${ASTGREP_SHA256}  /tmp/ast-grep.zip" | sha256sum -c -
          unzip -q /tmp/ast-grep.zip ast-grep -d /tmp/ast-grep-bin
          sudo mv /tmp/ast-grep-bin/ast-grep /usr/local/bin/ast-grep
          ast-grep --version

      - name: Build impact map
        env:
          BASE_REF: ${{ needs.gate.outputs.base_ref }}
          MODE: ${{ needs.gate.outputs.mode }}
          LAST_SHA: ${{ needs.gate.outputs.last_sha }}
          IGNORE_PATTERNS: ${{ needs.gate.outputs.ignore_patterns }}
        run: |
          set -euo pipefail
          command -v rg >/dev/null || { echo "::error::ripgrep (rg) is not installed; impact map would be silently empty"; exit 1; }
          # shellcheck source=.ai-review-tooling/scripts/lib/scope.sh
          . .ai-review-tooling/scripts/lib/scope.sh
          # shellcheck source=.ai-review-tooling/scripts/lib/context.sh
          . .ai-review-tooling/scripts/lib/context.sh
          # shellcheck source=.ai-review-tooling/scripts/lib/cochange.sh
          . .ai-review-tooling/scripts/lib/cochange.sh
          # Build patterns file: config patterns (from gate) + built-in patterns.
          patterns_file="$(mktemp /tmp/context-patterns.XXXXXX)"
          if [ -n "$IGNORE_PATTERNS" ]; then
            printf '%s\n' "$IGNORE_PATTERNS" >> "$patterns_file"
          fi
          scope_builtin_ignores >> "$patterns_file"
          # Resolve an explicit merge-base for the full-mode range: the `A...B`
          # shorthand silently yields an EMPTY diff when CI hasn't fetched the
          # history needed to find the merge-base, which would blank the impact
          # map, co-change leads, and the ast-grep def/ref section. Deepen and
          # compute it; fall back to a two-dot range so the map is never empty.
          if [ "$MODE" = incremental ] && [ -n "$LAST_SHA" ] \
            && git cat-file -e "${LAST_SHA}^{commit}" 2>/dev/null; then
            range="${LAST_SHA}..HEAD"
          else
            git fetch --deepen=200 origin "${BASE_REF}" >/dev/null 2>&1 || true
            mb="$(git merge-base "origin/${BASE_REF}" HEAD 2>/dev/null || true)"
            [ -n "$mb" ] || mb="origin/${BASE_REF}"
            range="${mb}..HEAD"
          fi
          echo "Impact range: $range"
          # Split byte budget: impact map 52 KB + co-change 8 KB = 60 KB total.
          # This guarantees the co-change section is never truncated away by a huge
          # impact map. fetch-depth: 0 is already set on this job (no change needed).
          context_build_map "$range" "$patterns_file" > context-impact.md
          cochange_build_map "$range" "origin/${BASE_REF}" "$patterns_file" > context-cochange.md
          rm -f "$patterns_file"
          head -c 52000 context-impact.md > context.md
          head -c 8000 context-cochange.md >> context.md
          wc -c context.md

      - name: Upload context artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: context
          path: context.md

  llm-review:
    needs: [gate, static, context]
    if: needs.gate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Privilege separation: this job feeds untrusted PR content to an LLM,
      # so its token must not be able to push code. contents:read still allows
      # authenticated fetches. The contents:write needed by GitHub's
      # resolveReviewThread mutation lives in the deterministic finalize job,
      # which runs no LLM. GitHub tokens are NOT passed to the opencode drafter
      # or skeptic steps; only the posting step receives github.token.
      contents: read
      pull-requests: write
      issues: write
    outputs:
      verdict: ${{ steps.post.outputs.verdict }}
      intended_verdict: ${{ steps.post.outputs.intended_verdict }}
    steps:
      - name: Checkout PR head (caller repo)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Pin to the exact SHA the gate resolved (not refs/pull/N/head) so a
          # push between gate and checkout can't swap in unreviewed code.
          ref: ${{ needs.gate.outputs.head_sha }}
          fetch-depth: 0
          # No persisted credentials: the LLM agents have no GitHub token and
          # cannot push. The posting step uses github.token directly via gh.
          persist-credentials: false

      # Bump ref when releasing v2 of divkix/ai-review.
      - name: Checkout ai-review tooling (prompts + lib)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: divkix/ai-review
          ref: v0.4.0
          path: .ai-review-tooling
          persist-credentials: false

      - name: Download findings artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: findings

      - name: Download context artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: context

      - name: Fetch base ref
        env:
          BASE_REF: ${{ needs.gate.outputs.base_ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git -c "http.extraheader=AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')" \
            fetch origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: Fetch live review threads
        id: threads
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.gate.outputs.pr }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          # threads.json must live INSIDE the workspace so the skeptic agent can
          # read it via the standard read permission (opencode's external_directory
          # permission defaults to deny in non-interactive --run mode; $RUNNER_TEMP
          # is outside $GITHUB_WORKSPACE and would be silently denied).
          mkdir -p "$GITHUB_WORKSPACE/.ai-review-out"
          threads_out="$GITHUB_WORKSPACE/.ai-review-out/threads.json"
          # Paginated cursor loop — do NOT use a single last:100.
          cursor=""
          all_nodes='[]'
          while true; do
            if [ -n "$cursor" ]; then
              # shellcheck disable=SC2016  # $owner/$repo/$number are GraphQL vars, not shell
              page_result="$(gh api graphql \
                -f query='
                  query($owner: String!, $repo: String!, $number: Int!, $after: String) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 50, after: $after) {
                          nodes {
                            id
                            isResolved
                            comments(first: 1) {
                              nodes { path body databaseId }
                            }
                          }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' \
                -f owner="$owner" -f repo="$repo" -F number="$PR_NUMBER" -f after="$cursor" \
                2>&1)" || { echo "::warning::Thread fetch failed (cursor=$cursor); using threads so far."; break; }
            else
              # shellcheck disable=SC2016  # $owner/$repo/$number are GraphQL vars, not shell
              page_result="$(gh api graphql \
                -f query='
                  query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 50) {
                          nodes {
                            id
                            isResolved
                            comments(first: 1) {
                              nodes { path body databaseId }
                            }
                          }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' \
                -f owner="$owner" -f repo="$repo" -F number="$PR_NUMBER" \
                2>&1)" || { echo "::warning::Thread fetch failed (initial); writing []."; break; }
            fi
            nodes="$(jq '.data.repository.pullRequest.reviewThreads.nodes // []' <<<"$page_result")"
            all_nodes="$(jq -n --argjson a "$all_nodes" --argjson b "$nodes" '$a + $b')"
            has_next="$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage // "false"' <<<"$page_result")"
            cursor="$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // ""' <<<"$page_result")"
            if [ "$has_next" != "true" ] || [ -z "$cursor" ]; then break; fi
          done
          printf '%s\n' "$all_nodes" > "$threads_out" || printf '[]' > "$threads_out"
          echo "threads_path=$threads_out" >> "$GITHUB_OUTPUT"
          echo "Fetched $(jq length "$threads_out") thread(s)"

      - name: Compose prompts and resolve baseline
        id: prompt
        env:
          MODE: ${{ needs.gate.outputs.mode }}
          LAST_SHA: ${{ needs.gate.outputs.last_sha }}
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
          BASE_REF: ${{ needs.gate.outputs.base_ref }}
          IGNORE_PATTERNS: ${{ needs.gate.outputs.ignore_patterns }}
          INSTRUCTIONS: ${{ needs.gate.outputs.instructions }}
          GUIDELINES_CONTENT: ${{ needs.gate.outputs.guidelines_content }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/lib/reconcile.sh
          . .ai-review-tooling/scripts/lib/reconcile.sh
          # shellcheck source=.ai-review-tooling/scripts/lib/scope.sh
          . .ai-review-tooling/scripts/lib/scope.sh
          eff="$(reconcile_effective_baseline "$MODE" "$LAST_SHA")"
          effective_mode="$(sed -n 's/^mode=//p' <<<"$eff")"
          effective_last_sha="$(sed -n 's/^last_sha=//p' <<<"$eff")"
          if [ "$effective_mode" != "$MODE" ]; then
            echo "Baseline $LAST_SHA unreachable (force-push?); falling back to full review."
          fi
          # Compute IGNORE_PATHSPECS from config patterns (space-joined, single-quoted).
          ignore_pathspecs=""
          if [ -n "$IGNORE_PATTERNS" ]; then
            pats_file="$(mktemp /tmp/prompt-pats.XXXXXX)"
            printf '%s\n' "$IGNORE_PATTERNS" > "$pats_file"
            while IFS= read -r spec; do
              ignore_pathspecs="${ignore_pathspecs}'${spec}' "
            done < <(scope_exclude_pathspecs "$pats_file")
            rm -f "$pats_file"
            ignore_pathspecs="${ignore_pathspecs% }"  # trim trailing space
          fi
          {
            echo "effective_last_sha=$effective_last_sha"
            echo "effective_mode=$effective_mode"
            echo "ignore_pathspecs=${ignore_pathspecs}"
          } >> "$GITHUB_OUTPUT"

          # Output paths: drafter writes here, verifier writes here.
          mkdir -p "$GITHUB_WORKSPACE/.ai-review-out"
          draft_path="$GITHUB_WORKSPACE/.ai-review-out/draft.json"
          verified_path="$GITHUB_WORKSPACE/.ai-review-out/verified.json"
          echo "draft_path=$draft_path" >> "$GITHUB_OUTPUT"
          echo "verified_path=$verified_path" >> "$GITHUB_OUTPUT"

          if [ "$effective_mode" = "incremental" ]; then
            playbook=".ai-review-tooling/prompts/review-incremental.md"
          else
            playbook=".ai-review-tooling/prompts/review-full.md"
          fi

          # Drafter prompt: mode playbook + shared protocol, substituting only
          # the explicit var list so code examples with other $ text are untouched.
          # shellcheck disable=SC2016  # literal $VAR in envsubst var list
          DRAFT_PATH="$draft_path" \
          VERIFIED_PATH="$verified_path" \
          THREADS_PATH="${{ steps.threads.outputs.threads_path }}" \
          FINDINGS_PATH="$GITHUB_WORKSPACE/findings.json" \
          CONTEXT_PATH="$GITHUB_WORKSPACE/context.md" \
          REVIEW_MODE="$effective_mode" \
          LAST_SHA="$effective_last_sha" \
          HEAD_SHA="$HEAD_SHA" \
          PRIOR_STATE_JSON="${{ needs.gate.outputs.state_json }}" \
          IGNORE_PATHSPECS="$ignore_pathspecs" \
          envsubst '$BASE_REF $HEAD_SHA $LAST_SHA $REVIEW_MODE $FINDINGS_PATH $CONTEXT_PATH $IGNORE_PATHSPECS $DRAFT_PATH $VERIFIED_PATH $THREADS_PATH $PRIOR_STATE_JSON' \
            < <(cat "$playbook"; printf '\n\n'; cat ".ai-review-tooling/prompts/review-common.md") \
            > "$RUNNER_TEMP/prompt-draft.md"

          # Append per-repo instructions to drafter prompt via scope_render_instructions
          # (literal, NOT through envsubst — content is repo-authored and may contain
          # $ or backticks). scope_render_instructions uses printf '%s\n' so a leading
          # '-' in an instruction never trips bash's builtin printf option parsing.
          if [ -n "$INSTRUCTIONS" ]; then
            printf '%s' "$INSTRUCTIONS" | scope_render_instructions >> "$RUNNER_TEMP/prompt-draft.md"
          fi
          # GUIDELINES_CONTENT is a complete, pre-rendered "## Repo guidelines"
          # section (it owns its own leading blank lines, header, hardened lead,
          # and per-source subheadings) built by scope_render_guidelines in the
          # gate. Append it literally — NOT through envsubst — so $VAR/backticks
          # in a guideline file are safe.
          if [ -n "$GUIDELINES_CONTENT" ]; then
            printf '%s\n' "$GUIDELINES_CONTENT" >> "$RUNNER_TEMP/prompt-draft.md"
          fi

          # Verifier prompt: verify playbook only, same substitution.
          # shellcheck disable=SC2016  # literal $VAR in envsubst var list
          DRAFT_PATH="$draft_path" \
          VERIFIED_PATH="$verified_path" \
          THREADS_PATH="${{ steps.threads.outputs.threads_path }}" \
          FINDINGS_PATH="$GITHUB_WORKSPACE/findings.json" \
          CONTEXT_PATH="$GITHUB_WORKSPACE/context.md" \
          REVIEW_MODE="$effective_mode" \
          LAST_SHA="$effective_last_sha" \
          HEAD_SHA="$HEAD_SHA" \
          PRIOR_STATE_JSON="${{ needs.gate.outputs.state_json }}" \
          IGNORE_PATHSPECS="$ignore_pathspecs" \
          envsubst '$BASE_REF $HEAD_SHA $LAST_SHA $REVIEW_MODE $FINDINGS_PATH $CONTEXT_PATH $IGNORE_PATHSPECS $DRAFT_PATH $VERIFIED_PATH $THREADS_PATH $PRIOR_STATE_JSON' \
            < ".ai-review-tooling/prompts/review-verify.md" \
            > "$RUNNER_TEMP/prompt-verify.md"

          # Append per-repo instructions to verifier prompt via scope_render_instructions.
          if [ -n "$INSTRUCTIONS" ]; then
            printf '%s' "$INSTRUCTIONS" | scope_render_instructions >> "$RUNNER_TEMP/prompt-verify.md"
          fi
          # Same literal append as the drafter prompt (see note above).
          if [ -n "$GUIDELINES_CONTENT" ]; then
            printf '%s\n' "$GUIDELINES_CONTENT" >> "$RUNNER_TEMP/prompt-verify.md"
          fi

      # Pinned CLI instead of the upstream wrapper action: the wrapper
      # installs whatever the LATEST opencode release is at runtime
      # (curl | bash), so behavior could change under us and the supply chain
      # was unpinned. Bump version + sha256 together when upgrading.
      - name: Install opencode (pinned)
        run: |
          set -euo pipefail
          OPENCODE_VERSION="1.17.7"
          OPENCODE_SHA256="60fe5a92dc9af64ec079348fedde17e12da6a867efe7e8353be8038480607924"
          curl -fsSL -o /tmp/opencode.tar.gz \
            "https://github.com/anomalyco/opencode/releases/download/v${OPENCODE_VERSION}/opencode-linux-x64.tar.gz"
          echo "${OPENCODE_SHA256}  /tmp/opencode.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/opencode.tar.gz -C /usr/local/bin opencode
          opencode --version

      - name: Export provider API key
        env:
          API_KEY_ENV: ${{ inputs.api_key_env }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          set -euo pipefail
          # Guard: the env NAME is caller-controlled config; constrain it so it
          # cannot smuggle GITHUB_ENV line injections or clobber GITHUB_/RUNNER_ vars.
          if ! grep -qE '^[A-Z][A-Z0-9_]{0,63}$' <<<"$API_KEY_ENV" \
             || grep -qE '^(GITHUB_|RUNNER_)' <<<"$API_KEY_ENV"; then
            echo "::error::invalid api_key_env name"; exit 1
          fi
          echo "${API_KEY_ENV}=${LLM_API_KEY}" >> "$GITHUB_ENV"

      # Defense-in-depth: a PR-committed opencode config is loaded by opencode
      # from the checked-out PR head and, even though OPENCODE_CONFIG_CONTENT is
      # a higher-priority layer, deep-merging it can break the locked-down agents
      # (observed: the drafter ended up read-only and could not write its output,
      # failing the review). Strip any PR-controlled opencode config from the
      # workspace before running the agents — the diff still carries the file, so
      # it is still reviewed; opencode just won't load it as configuration.
      - name: Strip PR-controlled opencode config
        run: |
          set -euo pipefail
          find "$GITHUB_WORKSPACE" -maxdepth 4 -type f \
            \( -name 'opencode.json' -o -name 'opencode.jsonc' -o -name 'opencode.json5' \) \
            -print -delete 2>/dev/null || true
          find "$GITHUB_WORKSPACE" -maxdepth 4 -type d -name '.opencode' \
            -print -exec rm -rf {} + 2>/dev/null || true
          echo "Stripped any PR-committed opencode config from the workspace."

      - name: Run drafter
        env:
          MODEL: ${{ inputs.model }}
          VARIANT: ${{ inputs.variant }}
          # OPENCODE_CONFIG_CONTENT overrides any opencode.json/.opencode in the
          # PR's working tree — this is the security point: a PR cannot weaken
          # drafter permissions by committing its own opencode config.
          # No GitHub tokens here; agents have no posting permissions.
          #
          # edit glob rationale: opencode's edit/write tools call
          #   ctx.ask({ permission: "edit", patterns: [path.relative(worktree, filePath)] })
          # so the pattern is always RELATIVE from the workspace root, e.g.
          # ".ai-review-out/draft.json". The "**/" prefix requires ≥1 leading
          # segment, so it would never match the bare ".ai-review-out/draft.json"
          # case. We add both the relative form and the "**/" form (belt-and-braces
          # for any future opencode version that passes absolute paths).
          OPENCODE_CONFIG_CONTENT: >-
            {
              "share": "disabled",
              "agent": {
                "drafter": {
                  "permission": {
                    "*": "deny",
                    "read": "allow",
                    "glob": "allow",
                    "list": "allow",
                    "grep": "allow",
                    "bash": {"*": "deny", "git diff*": "allow", "git log*": "allow", "git show*": "allow", "git cat-file*": "allow"},
                    "edit": {"*": "deny", ".ai-review-out/draft.json": "allow", "**/.ai-review-out/draft.json": "allow"},
                    "webfetch": "deny",
                    "websearch": "deny"
                  }
                },
                "skeptic": {
                  "permission": {
                    "*": "deny",
                    "read": "allow",
                    "glob": "allow",
                    "list": "allow",
                    "grep": "allow",
                    "bash": "allow",
                    "edit": {"*": "deny", ".ai-review-out/verified.json": "allow", "**/.ai-review-out/verified.json": "allow"},
                    "webfetch": "deny",
                    "websearch": "deny"
                  }
                }
              }
            }
          DRAFT_PATH: ${{ steps.prompt.outputs.draft_path }}
          VERIFIED_PATH: ${{ steps.prompt.outputs.verified_path }}
          THREADS_PATH: ${{ steps.threads.outputs.threads_path }}
          FINDINGS_PATH: ${{ github.workspace }}/findings.json
          CONTEXT_PATH: ${{ github.workspace }}/context.md
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
          LAST_SHA: ${{ steps.prompt.outputs.effective_last_sha }}
          PRIOR_STATE_JSON: ${{ needs.gate.outputs.state_json }}
          REVIEW_MODE: ${{ steps.prompt.outputs.effective_mode }}
          BASE_REF: ${{ needs.gate.outputs.base_ref }}
          PR_NUMBER: ${{ needs.gate.outputs.pr }}
          IGNORE_PATHSPECS: ${{ steps.prompt.outputs.ignore_pathspecs }}
        run: |
          set -euo pipefail
          opencode run -m "$MODEL" ${VARIANT:+--variant "$VARIANT"} \
            --agent drafter \
            --title "ai-review drafter $HEAD_SHA" \
            < "$RUNNER_TEMP/prompt-draft.md"

      - name: Validate draft (with bounded retry)
        env:
          DRAFT_PATH: ${{ steps.prompt.outputs.draft_path }}
          MODEL: ${{ inputs.model }}
          VARIANT: ${{ inputs.variant }}
          OPENCODE_CONFIG_CONTENT: >-
            {
              "share": "disabled",
              "agent": {
                "drafter": {
                  "permission": {
                    "*": "deny",
                    "read": "allow",
                    "glob": "allow",
                    "list": "allow",
                    "grep": "allow",
                    "bash": {"*": "deny", "git diff*": "allow", "git log*": "allow", "git show*": "allow", "git cat-file*": "allow"},
                    "edit": {"*": "deny", ".ai-review-out/draft.json": "allow", "**/.ai-review-out/draft.json": "allow"},
                    "webfetch": "deny",
                    "websearch": "deny"
                  }
                }
              }
            }
        run: |
          set -euo pipefail
          validate_draft() {
            jq -e 'type=="object"
              and (.walkthrough | type == "string")
              and (.findings | type == "array")
              and (.mode == "full" or .mode == "incremental")' "$DRAFT_PATH" > /dev/null 2>&1
          }
          attempt=0
          while ! validate_draft; do
            attempt=$((attempt + 1))
            if [ "$attempt" -gt 2 ]; then
              echo "::error::draft.json failed validation after $attempt attempts"
              exit 1
            fi
            jq_err="$(jq -e 'type=="object" and (.walkthrough|type=="string") and (.findings|type=="array") and (.mode=="full" or .mode=="incremental")' "$DRAFT_PATH" 2>&1 || true)"
            fix_msg="The draft.json you wrote failed JSON schema validation. Fix it and overwrite $DRAFT_PATH. Error: $jq_err. Required: object with string walkthrough, array findings, and mode=full|incremental."
            echo "::warning::Draft validation failed (attempt $attempt); retrying with fix instruction"
            printf '%s\n' "$fix_msg" | opencode run -c -m "$MODEL" ${VARIANT:+--variant "$VARIANT"} --agent drafter
          done
          echo "Draft validated OK"

      - name: Run skeptic (verifier)
        env:
          MODEL: ${{ inputs.verifier_model != '' && inputs.verifier_model || inputs.model }}
          VARIANT: ${{ inputs.verifier_variant != '' && inputs.verifier_variant || inputs.variant }}
          OPENCODE_CONFIG_CONTENT: >-
            {
              "share": "disabled",
              "agent": {
                "skeptic": {
                  "permission": {
                    "*": "deny",
                    "read": "allow",
                    "glob": "allow",
                    "list": "allow",
                    "grep": "allow",
                    "bash": "allow",
                    "edit": {"*": "deny", ".ai-review-out/verified.json": "allow", "**/.ai-review-out/verified.json": "allow"},
                    "webfetch": "deny",
                    "websearch": "deny"
                  }
                }
              }
            }
          DRAFT_PATH: ${{ steps.prompt.outputs.draft_path }}
          VERIFIED_PATH: ${{ steps.prompt.outputs.verified_path }}
          THREADS_PATH: ${{ steps.threads.outputs.threads_path }}
          FINDINGS_PATH: ${{ github.workspace }}/findings.json
          CONTEXT_PATH: ${{ github.workspace }}/context.md
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
          LAST_SHA: ${{ steps.prompt.outputs.effective_last_sha }}
          PRIOR_STATE_JSON: ${{ needs.gate.outputs.state_json }}
          REVIEW_MODE: ${{ steps.prompt.outputs.effective_mode }}
          BASE_REF: ${{ needs.gate.outputs.base_ref }}
          PR_NUMBER: ${{ needs.gate.outputs.pr }}
          IGNORE_PATHSPECS: ${{ steps.prompt.outputs.ignore_pathspecs }}
        run: |
          set -euo pipefail
          opencode run -m "$MODEL" ${VARIANT:+--variant "$VARIANT"} \
            --agent skeptic \
            --title "ai-review skeptic $HEAD_SHA" \
            < "$RUNNER_TEMP/prompt-verify.md"

      - name: Normalize and validate verified.json
        env:
          VERIFIED_PATH: ${{ steps.prompt.outputs.verified_path }}
        run: |
          set -euo pipefail
          # Normalize optional arrays the verifier may have omitted.
          jq '.rejected //= [] | .prior //= [] | .dropped_static //= []' "$VERIFIED_PATH" \
            > "$VERIFIED_PATH.tmp" && mv "$VERIFIED_PATH.tmp" "$VERIFIED_PATH"
          jq -e 'type=="object"
            and (.walkthrough | type == "string")
            and (.findings | type == "array")
            and (.mode == "full" or .mode == "incremental")
            and (.rejected | type == "array")' "$VERIFIED_PATH" > /dev/null \
            || { echo "::error::verified.json failed schema validation"; exit 1; }
          echo "Verified.json validated OK"

      - name: Post review and update status comment
        id: post
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.gate.outputs.pr }}
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
          LAST_SHA: ${{ steps.prompt.outputs.effective_last_sha }}
          REVIEW_MODE: ${{ steps.prompt.outputs.effective_mode }}
          BASE_REF: ${{ needs.gate.outputs.base_ref }}
          STATUS_COMMENT_ID: ${{ needs.gate.outputs.ack_comment_id }}
          TRIGGER_DESC: ${{ needs.gate.outputs.trigger_desc }}
          SIZE_WARNING: ${{ needs.gate.outputs.size_warning }}
          CONFIG_WARNING: ${{ needs.gate.outputs.config_warning }}
          IGNORE_PATHSPECS: ${{ steps.prompt.outputs.ignore_pathspecs }}
          VERIFIED_PATH: ${{ steps.prompt.outputs.verified_path }}
          THREADS_PATH: ${{ steps.threads.outputs.threads_path }}
          PRIOR_STATE_JSON: ${{ needs.gate.outputs.state_json }}
        run: |
          set -euo pipefail
          # shellcheck source=.ai-review-tooling/scripts/lib/post.sh
          . .ai-review-tooling/scripts/lib/post.sh

          # --- 1. Fingerprint findings -----------------------------------------
          # post_finding_fingerprints expects an ARRAY; extract .findings first,
          # then merge the fingerprinted array back into the full object.
          fp_findings="$(jq -c '.findings // []' "$VERIFIED_PATH" | post_finding_fingerprints)"
          jq --argjson f "$fp_findings" '.findings = $f' "$VERIFIED_PATH" > "$RUNNER_TEMP/verified-fp.json"

          # --- 2. Budget selection ---------------------------------------------
          budget_json="$(post_select_budget < "$RUNNER_TEMP/verified-fp.json")"
          inline_candidates="$(jq -c '.inline' <<<"$budget_json")"
          minors_from_budget="$(jq -c '.minors' <<<"$budget_json")"

          # --- 3. Build the anchor diff ----------------------------------------
          # Resolve the merge-base EXPLICITLY rather than via the `A...B`
          # shorthand: in CI the base ref is often fetched without the history
          # `git diff origin/BASE...HEAD` needs to find the merge-base, which
          # silently produces an EMPTY diff and demotes every inline comment to
          # the minors block. Deepen the base fetch, compute the merge-base, and
          # fall back to a two-dot diff so the anchor diff is never silently empty.
          diff_file="$RUNNER_TEMP/review.diff"
          if [ "$REVIEW_MODE" = "incremental" ] && [ -n "$LAST_SHA" ]; then
            from_ref="$LAST_SHA"
          else
            git fetch --deepen=200 origin "${BASE_REF}" >/dev/null 2>&1 || true
            from_ref="$(git merge-base "origin/${BASE_REF}" HEAD 2>/dev/null || true)"
            [ -n "$from_ref" ] || from_ref="origin/${BASE_REF}"
          fi
          # NOTE: do NOT append IGNORE_PATHSPECS here. It is formatted with
          # literal single quotes for the LLM's own shell (`-- ':(exclude)…'`);
          # the workflow's unquoted word-split would pass those quote characters
          # to git as part of the pathspec, matching NO files and yielding an
          # empty diff that demotes every inline comment. The anchor diff only
          # needs to contain the changed files the comments target — the LLM has
          # already scoped its comments away from ignored paths — so the full
          # range diff is the correct, robust input for anchor validation.
          git diff "${from_ref}" HEAD > "$diff_file" || true
          echo "::notice::post-git: base=$BASE_REF from_ref=${from_ref:0:12} range_commits=$(git rev-list --count "${from_ref}..HEAD" 2>/dev/null || echo ERR) diff_bytes=$(wc -c < "$diff_file")"

          # --- 4. Validate anchors ---------------------------------------------
          anchor_result="$(post_validate_anchors "$diff_file" <<<"$inline_candidates")"
          valid_inline="$(jq -c '.valid' <<<"$anchor_result")"
          demoted="$(jq -c '.demoted' <<<"$anchor_result")"

          # Posting diagnostics (operational visibility into the inline budget).
          echo "::notice::post: mode=$REVIEW_MODE base=$BASE_REF diff_bytes=$(wc -c < "$diff_file") inline_candidates=$(jq 'length' <<<"$inline_candidates") valid=$(jq 'length' <<<"$valid_inline") demoted=$(jq 'length' <<<"$demoted") minors=$(jq 'length' <<<"$minors_from_budget")"

          # Demoted + budget minors both go into the final minors block.
          all_minors="$(jq -n --argjson d "$demoted" --argjson m "$minors_from_budget" '$d + $m')"

          # --- 5. Derive verdict -----------------------------------------------
          verdict="$(post_derive_verdict < "$RUNNER_TEMP/verified-fp.json")"
          intended_verdict="$verdict"

          # --- 6. Compose review payload ---------------------------------------
          dropped_static="$(jq -c '.dropped_static // []' "$RUNNER_TEMP/verified-fp.json")"
          rejected="$(jq -c '.rejected // []' "$RUNNER_TEMP/verified-fp.json")"
          walkthrough="$(jq -r '.walkthrough // ""' "$RUNNER_TEMP/verified-fp.json")"
          compose_input="$(jq -n \
            --arg w "$walkthrough" \
            --argjson inline "$valid_inline" \
            --argjson minors "$all_minors" \
            --argjson ds "$dropped_static" \
            --argjson rej "$rejected" \
            '{"walkthrough":$w,"inline":$inline,"minors":$minors,"dropped_static":$ds,"rejected":$rej}')"
          post_compose_review "$verdict" <<<"$compose_input" > "$RUNNER_TEMP/review.json"

          # --- 7. POST the review (deterministic 3-rung fallback ladder) ------
          # Rung 1: composed review as-is.
          # Rung 2: same event, inline comments stripped into minors block
          #         (anchor-class degrade — covers 422 on any verdict).
          # Rung 3: COMMENT event with approval notice prepended to body
          #         (permission-class degrade — only when intended verdict is APPROVE).
          # Each downgrade is logged with ::warning::; job fails if rung 3 exhausted.
          event_used="$verdict"
          inline_posted=false
          if gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" \
              --input "$RUNNER_TEMP/review.json" \
              > "$RUNNER_TEMP/review-resp.json"; then
            inline_posted=true  # rung 1: inline comments posted as review threads
          else
            echo "::warning::Review POST failed (rung 1); degrading inline comments to minors block"
            degrade_input="$(jq -n \
              --arg w "$walkthrough" \
              --argjson minors "$(jq -n --argjson v "$valid_inline" --argjson m "$all_minors" '$v + $m')" \
              --argjson ds "$dropped_static" \
              --argjson rej "$rejected" \
              '{"walkthrough":$w,"inline":[],"minors":$minors,"dropped_static":$ds,"rejected":$rej}')"
            post_compose_review "$verdict" <<<"$degrade_input" > "$RUNNER_TEMP/review-degrade.json"
            if gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" \
                --input "$RUNNER_TEMP/review-degrade.json" \
                > "$RUNNER_TEMP/review-resp.json"; then
              inline_posted=false  # rung 2: inline folded into minors block, no threads
            else
              # Rung 3: permission-class degrade — only when intended verdict is APPROVE.
              if [ "$intended_verdict" = "APPROVE" ]; then
                echo "::warning::Review POST failed (rung 2); posting APPROVE verdict as COMMENT (permission-class degrade)"
                post_compose_review "COMMENT" <<<"$degrade_input" > "$RUNNER_TEMP/review-comment.json"
                orig_body="$(jq -r '.body' "$RUNNER_TEMP/review-comment.json")"
                new_body="$(printf '**Verdict: APPROVE** — posted as a comment because this repository does not allow GitHub Actions to approve pull requests.\n\n%s' "$orig_body")"
                jq --arg b "$new_body" '.body = $b' "$RUNNER_TEMP/review-comment.json" > "$RUNNER_TEMP/review-comment2.json"
                event_used="COMMENT"
                inline_posted=false  # rung 3: inline folded into minors block, no threads
                gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" \
                  --input "$RUNNER_TEMP/review-comment2.json" \
                  > "$RUNNER_TEMP/review-resp.json" \
                  || { echo "::error::Review POST failed on all three rungs"; exit 1; }
              else
                echo "::error::Review POST failed (rung 2); no further fallback for verdict $verdict"
                exit 1
              fi
            fi
          fi

          # --- 8. Re-fetch threads and match posted comments -------------------
          owner="${GITHUB_REPOSITORY%/*}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          cursor2=""
          all_nodes2='[]'
          while true; do
            if [ -n "$cursor2" ]; then
              # shellcheck disable=SC2016  # $owner/$repo/$number are GraphQL vars, not shell
              page2="$(gh api graphql \
                -f query='
                  query($owner: String!, $repo: String!, $number: Int!, $after: String) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 50, after: $after) {
                          nodes {
                            id
                            isResolved
                            comments(first: 1) {
                              nodes { path body databaseId }
                            }
                          }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' \
                -f owner="$owner" -f repo="$repo_name" -F number="$PR_NUMBER" -f after="$cursor2" \
                2>&1)" || { echo "::warning::Post-review thread fetch failed; thread matching may be incomplete."; break; }
            else
              # shellcheck disable=SC2016  # $owner/$repo/$number are GraphQL vars, not shell
              page2="$(gh api graphql \
                -f query='
                  query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 50) {
                          nodes {
                            id
                            isResolved
                            comments(first: 1) {
                              nodes { path body databaseId }
                            }
                          }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' \
                -f owner="$owner" -f repo="$repo_name" -F number="$PR_NUMBER" \
                2>&1)" || { echo "::warning::Post-review thread fetch failed; thread matching may be incomplete."; break; }
            fi
            nodes2="$(jq '.data.repository.pullRequest.reviewThreads.nodes // []' <<<"$page2")"
            all_nodes2="$(jq -n --argjson a "$all_nodes2" --argjson b "$nodes2" '$a + $b')"
            has_next2="$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage // "false"' <<<"$page2")"
            cursor2="$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // ""' <<<"$page2")"
            if [ "$has_next2" != "true" ] || [ -z "$cursor2" ]; then break; fi
          done
          printf '%s\n' "$all_nodes2" > "$RUNNER_TEMP/threads-post.json"

          # Match posted inline comments to thread IDs.
          # NOTE: POST /pulls/{n}/reviews returns a review object (id/state/body/user/etc.)
          # with NO inline comments array — reading .comments from the response always yields
          # null. Instead, match what we actually sent (valid_inline) against the freshly-
          # fetched threads. On rung 2/3 inline comments were folded into the minors block
          # and never posted as threads, so posted-comments must be [] there.
          if [ "$inline_posted" = "true" ]; then
            jq -c '[.[] | {path: .path, body: .body}]' <<<"$valid_inline" > "$RUNNER_TEMP/posted-comments.json"
          else
            printf '[]\n' > "$RUNNER_TEMP/posted-comments.json"
          fi
          matched="$(post_match_threads "$RUNNER_TEMP/posted-comments.json" "$RUNNER_TEMP/threads-post.json")"

          # --- 9. Build state findings array -----------------------------------
          # Prior unfixed entries from the verified output.
          prior_unfixed="$(jq -c '[.prior // [] | .[] | select(.status == "unfixed") | {
            threadId: .threadId,
            file: .path,
            fingerprint: (.fingerprint // null),
            severity: (.severity // null)
          }]' "$RUNNER_TEMP/verified-fp.json")"

          # Posted inline findings matched to threadIds.
          posted_findings="$(jq -n \
            --argjson inline "$valid_inline" \
            --argjson matched "$matched" \
            '[range($inline | length) as $i |
              ($inline[$i]) as $f |
              ($matched | map(select(.path == $f.path and .body == $f.body)) | first // {"threadId": null}) as $m |
              {
                threadId: $m.threadId,
                file: $f.path,
                fingerprint: ($f.fingerprint // null),
                severity: ($f.severity // null)
              }]')"

          # On APPROVE with nothing unfixed, state findings = []
          if [ "$intended_verdict" = "APPROVE" ]; then
            state_findings='[]'
          else
            state_findings="$(jq -n --argjson p "$prior_unfixed" --argjson n "$posted_findings" '$p + $n')"
          fi

          # --- 10. Compose state marker and update sticky comment --------------
          state_marker="$(post_compose_state "$HEAD_SHA" <<<"$state_findings")"
          repo_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          short_head="${HEAD_SHA:0:7}"
          if [ "$REVIEW_MODE" = "incremental" ] && [ -n "$LAST_SHA" ]; then
            range_link="[\`${LAST_SHA:0:7}\`…\`${short_head}\`](${repo_url}/compare/${LAST_SHA}...${HEAD_SHA})"
          else
            range_link="[\`${short_head}\`](${repo_url}/commit/${HEAD_SHA})"
          fi
          # Deterministic one-line summary.
          if [ "$REVIEW_MODE" = "full" ]; then
            n_blocking="$(jq '[.findings // [] | .[] | select(.severity=="blocker" and (.confidence=="high" or .confidence=="medium"))] | length' "$RUNNER_TEMP/verified-fp.json")"
            n_major="$(jq '[.findings // [] | .[] | select(.severity=="major" and (.confidence=="high" or .confidence=="medium"))] | length' "$RUNNER_TEMP/verified-fp.json")"
            n_minor="$(jq 'length' <<<"$all_minors")"
            if [ "$n_blocking" -eq 0 ] && [ "$n_major" -eq 0 ] && [ "$n_minor" -eq 0 ]; then
              summary="No findings."
            else
              summary="${n_blocking} blocking, ${n_major} major, ${n_minor} minor/nit findings."
            fi
          else
            n_resolved="$(jq '[.prior // [] | .[] | select(.status=="fixed")] | length' "$RUNNER_TEMP/verified-fp.json")"
            n_remaining="$(jq '[.prior // [] | .[] | select(.status=="unfixed")] | length' "$RUNNER_TEMP/verified-fp.json")"
            n_new="$(jq 'length' <<<"$valid_inline")"
            summary="Resolved ${n_resolved}, remaining ${n_remaining}, new ${n_new}."
          fi
          # Verdict label (uses event actually posted).
          case "$event_used" in
            REQUEST_CHANGES) verdict_label="REQUEST_CHANGES" ;;
            APPROVE)         verdict_label="APPROVE" ;;
            COMMENT)         verdict_label="COMMENT" ;;
            *)               verdict_label="$event_used" ;;
          esac
          # Build warnings lines.
          extra_lines=""
          [ -n "$SIZE_WARNING" ]   && extra_lines="${extra_lines}${SIZE_WARNING}\n"
          [ -n "$CONFIG_WARNING" ] && extra_lines="${extra_lines}${CONFIG_WARNING}\n"

          marker_ack="<!-- ai-review:ack -->"
          status_body="$(printf '%s\n\n✅ ai-review: **%s** review of %s — **%s** (triggered by %s)\n\n%s\n%s%s' \
            "$marker_ack" \
            "$REVIEW_MODE" \
            "$range_link" \
            "$verdict_label" \
            "$TRIGGER_DESC" \
            "$summary" \
            "$extra_lines" \
            "$state_marker")"
          # Write to a temp file so we don't have to worry about shell quoting of the body.
          jq -n --arg body "$status_body" '{"body": $body}' > "$RUNNER_TEMP/status-update.json"
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$STATUS_COMMENT_ID" \
            --input "$RUNNER_TEMP/status-update.json" > /dev/null

          # --- 11. Emit job outputs -------------------------------------------
          delim_v="VERDICT_EOF_$(od -An -N8 -tx1 /dev/urandom | tr -d ' \n')"
          {
            echo "verdict<<${delim_v}"
            echo "$event_used"
            echo "${delim_v}"
            echo "intended_verdict<<${delim_v}"
            echo "$intended_verdict"
            echo "${delim_v}"
          } >> "$GITHUB_OUTPUT"

  # Deterministic post-pass — no LLM, trusted shell only. Owns the review
  # lifecycle mutations that must not depend on agent compliance (we observed
  # DeepSeek skip instructed steps), and isolates the contents:write that
  # GitHub's resolveReviewThread mutation requires (FORBIDDEN with
  # contents:read; community discussion #44650) away from the job that reads
  # untrusted PR content.
  finalize:
    needs: [gate, llm-review]
    if: needs.gate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      # The pure reconcile transforms live in scripts/lib/reconcile.sh (unit
      # tested by tests/reconcile.bats); check the tooling out so this job can
      # source them. Bump ref when releasing v2. No PR-head checkout is needed
      # — this job only talks to the GitHub API.
      - name: Checkout ai-review tooling (lib)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: divkix/ai-review
          ref: v0.4.0
          path: .ai-review-tooling
          persist-credentials: false

      - name: Reconcile review lifecycle
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.gate.outputs.pr }}
          PRIOR_REVIEW_ID: ${{ needs.gate.outputs.prior_review_id }}
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
          # Job output from llm-review (empty when the expression is evaluated before
          # the posting step emitted it, e.g. reruns of finalize alone; llm-review
          # job failures cause finalize to be SKIPPED entirely via the if: condition).
          INTENDED_VERDICT: ${{ needs.llm-review.outputs.intended_verdict }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/lib/reconcile.sh
          . .ai-review-tooling/scripts/lib/reconcile.sh

          # Prefer the llm-review job's intended_verdict output when present
          # (deterministic); fall back to re-deriving from the API (job-failure path).
          if [ -n "$INTENDED_VERDICT" ]; then
            latest_state="$INTENDED_VERDICT"
            echo "Using llm-review intended_verdict: $latest_state"
          else
            latest_state=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" --paginate \
              | jq -rs 'add
                  | [.[] | select((.user.type == "Bot")
                      and (.user.login | startswith("github-actions"))
                      and (.state != "DISMISSED") and (.state != "PENDING"))]
                  | last | .state // empty') || latest_state=""
            echo "Derived latest bot review state from API: ${latest_state:-none}"
          fi

          # Dismiss the superseded REQUEST_CHANGES review when the verdict
          # flipped to APPROVE (idempotent; COMMENT fallback for APPROVE counts).
          if [ "$latest_state" = "APPROVE" ] && [ -n "$PRIOR_REVIEW_ID" ]; then
            gh api -X PUT "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews/$PRIOR_REVIEW_ID/dismissals" \
              -f message="Superseded by updated ai-review approval" -f event="DISMISS" \
              || echo "Dismissal failed (already dismissed?); continuing."
          elif [ "$latest_state" = "APPROVED" ] && [ -n "$PRIOR_REVIEW_ID" ]; then
            gh api -X PUT "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews/$PRIOR_REVIEW_ID/dismissals" \
              -f message="Superseded by updated ai-review approval" -f event="DISMISS" \
              || echo "Dismissal failed (already dismissed?); continuing."
          fi

          # The state marker the posting step just wrote lists the findings that
          # are STILL OPEN (with their live threadIds). Contract: any unresolved
          # bot-authored thread whose id is absent from that list is fixed or
          # stale -> resolve it. On APPROVE the list is empty, so everything
          # bot-authored gets resolved. Threads in the state stay open.
          state_json="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --paginate \
            | reconcile_state_from_comments)"
          # Use APPROVE (from API) for the gate check; INTENDED_VERDICT is our
          # logical verdict, but the API state is what matters for the gate.
          api_state=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" --paginate \
            | jq -rs 'add
                | [.[] | select((.user.type == "Bot")
                    and (.user.login | startswith("github-actions"))
                    and (.state != "DISMISSED") and (.state != "PENDING"))]
                | last | .state // empty') || api_state=""
          gate="$(reconcile_resolution_gate "${api_state:-}" "$HEAD_SHA" <<<"$state_json")"
          if [ "$gate" != "proceed" ]; then
            echo "Resolution gate: $gate — skipping thread resolution."
            exit 0
          fi
          # APPROVE intent (even if posted as COMMENT fallback): resolve everything.
          if [ "$latest_state" = "APPROVE" ] || [ "$api_state" = "APPROVED" ]; then
            state_ids=""
          else
            state_ids="$(reconcile_open_thread_ids <<<"$state_json")"
          fi
          echo "Thread ids still open per state: ${state_ids:-none}"

          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          # Paginated cursor loop for live thread IDs.
          cursor3=""
          thread_ids=""
          while true; do
            if [ -n "$cursor3" ]; then
              # shellcheck disable=SC2016
              page3="$(gh api graphql \
                -f query='
                  query($owner: String!, $repo: String!, $number: Int!, $after: String) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 50, after: $after) {
                          nodes {
                            id
                            isResolved
                            comments(first: 1) { nodes { author { login } } }
                          }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' \
                -f owner="$owner" -f repo="$repo" -F number="$PR_NUMBER" -f after="$cursor3")"
            else
              # shellcheck disable=SC2016
              page3="$(gh api graphql \
                -f query='
                  query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 50) {
                          nodes {
                            id
                            isResolved
                            comments(first: 1) { nodes { author { login } } }
                          }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }' \
                -f owner="$owner" -f repo="$repo" -F number="$PR_NUMBER")"
            fi
            new_ids="$(jq -r '
              .data.repository.pullRequest.reviewThreads.nodes[]
              | select(.isResolved == false and .comments.nodes[0].author.login == "github-actions")
              | .id' <<<"$page3" || true)"
            [ -n "$new_ids" ] && thread_ids="$(printf '%s\n%s' "$thread_ids" "$new_ids")"
            has_next3="$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage // "false"' <<<"$page3")"
            cursor3="$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // ""' <<<"$page3")"
            if [ "$has_next3" != "true" ] || [ -z "$cursor3" ]; then break; fi
          done
          thread_ids="${thread_ids#$'\n'}"  # strip leading newline

          [ -n "$thread_ids" ] || { echo "No unresolved bot threads."; exit 0; }
          printf '%s\n' "$thread_ids" > "$RUNNER_TEMP/live_ids"
          printf '%s\n' "$state_ids" > "$RUNNER_TEMP/state_ids"
          reconcile_resolve_set "$RUNNER_TEMP/live_ids" "$RUNNER_TEMP/state_ids" \
            > "$RUNNER_TEMP/resolve_ids"
          [ -s "$RUNNER_TEMP/resolve_ids" ] || { echo "Nothing to resolve (all open threads still in state)."; exit 0; }
          while IFS= read -r id; do
            [ -n "$id" ] || continue
            echo "Resolving $id"
            # shellcheck disable=SC2016
            gh api graphql -f query='
              mutation($id: ID!) {
                resolveReviewThread(input: {threadId: $id}) { thread { isResolved } }
              }' -f id="$id"
          done < "$RUNNER_TEMP/resolve_ids"
